<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />

    <!-- Android viewport — no zoom, full screen -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#009688" />

    <!-- Android PWA / Capacitor -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MyCadCam" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Prevent text size adjust on orientation change -->
    <style>
      html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    </style>

    <link rel="manifest" href="./manifest.json" />
    <title>MyCadCam Lab</title>

    <!-- System font stack — no Google Fonts dependency (works offline in APK) -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      body { font-family: 'Inter', -apple-system, 'Roboto', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
